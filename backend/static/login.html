<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNA Monitor - Iniciar Sesión</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <div class="logo-icon"></div>
                <h1>BNA Exchange Monitor</h1>
                <p>Panel de Administración</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••••••" required autocomplete="current-password">
                </div>
                
                <div id="errorMessage" class="error-banner hidden"></div>
                
                <button type="submit" class="btn-primary" id="submitBtn">
                    <span>Ingresar al Sistema</span>
                    <div class="spinner hidden"></div>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const errorMessage = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');
            const spinner = submitBtn.querySelector('.spinner');
            const btnText = submitBtn.querySelector('span');
            
            // UI Feedback
            errorMessage.classList.add('hidden');
            submitBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.classList.add('fade-out');

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: usernameInput.value,
                        password: passwordInput.value
                    })
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    // Redirigir al dashboard raíz
                    window.location.href = '/';
                } else {
                    errorMessage.textContent = data.detail || 'Credenciales inválidas.';
                    errorMessage.classList.remove('hidden');
                    
                    submitBtn.disabled = false;
                    spinner.classList.add('hidden');
                    btnText.classList.remove('fade-out');
                }
            } catch (err) {
                console.error(err);
                errorMessage.textContent = 'Error de conexión con el servidor.';
                errorMessage.classList.remove('hidden');
                
                submitBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.classList.remove('fade-out');
            }
        });
    </script>
</body>
</html>
